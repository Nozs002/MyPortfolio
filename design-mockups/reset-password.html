<!doctype html>
<html lang="vi" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khôi phục mật khẩu — MyPortfolio</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      /* Custom immersive styles for login/reset page */
      body.login-body {
        background-image: url('assets/login_bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
        position: relative;
        overflow-y: auto;
        transition: background-image 0.5s ease;
      }

      [data-theme='dark'] body.login-body {
        background-image:
          linear-gradient(rgba(11, 15, 25, 0.65), rgba(11, 15, 25, 0.65)),
          url('assets/login_bg.jpg');
      }

      /* Ensure background canvas works properly */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* Frosted glass overlay covering the entire background */
      .frosted-glass-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(
          15,
          23,
          42,
          0.45
        ); /* Elegant translucent dark overlay */
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
        z-index: 2;
        pointer-events: none;
        transition: background 0.3s ease;
      }

      [data-theme='light'] .frosted-glass-overlay {
        background: rgba(
          240,
          244,
          248,
          0.5
        ); /* Elegant light tint frosted overlay */
      }

      .login-container {
        position: relative;
        z-index: 10;
        /* Above canvas and overlay */
        width: 100%;
        max-width: 799px;
        /* Fits 320px illustration + 539px card with 60px overlap */
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
        transition: all 0.3s ease;
      }

      .login-illustration {
        width: 320px;
        height: 396px; /* Offset to overlap 336px card perfectly */
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(10, 8, 28, 0.18);
        z-index: 12;
        position: relative;
        margin-right: -60px;
        /* Overlaps with the card on the right */
        flex-shrink: 0;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .login-illustration img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: filter 0.5s ease;
      }

      [data-theme='dark'] .login-illustration img {
        filter: brightness(0.8) contrast(1.1) saturate(0.9);
      }

      .login-card {
        width: 539px; /* Fixed width matching login page */
        max-width: 100%;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.15);
        /* Elegant highly transparent light glass */
        backdrop-filter: blur(32px) saturate(190%);
        -webkit-backdrop-filter: blur(32px) saturate(190%);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 32px;
        box-shadow:
          0 20px 40px -10px rgba(31, 41, 55, 0.06),
          0 0 30px rgba(79, 70, 229, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        padding: 1.5rem 2.5rem 1.5rem 5.5rem;
        /* Reduced vertical padding to fit 336px height */
        text-align: center;
        color: var(--text-primary);
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease,
          background 0.3s ease,
          border 0.3s ease;
        z-index: 11;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 336px; /* Fixed height matching login page */
      }

      .login-container:hover .login-illustration {
        transform: translateY(-4px);
        box-shadow: 0 25px 50px rgba(10, 8, 28, 0.22);
      }

      .login-container:hover .login-card {
        transform: translateY(-4px);
        box-shadow:
          0 25px 45px -8px rgba(31, 41, 55, 0.1),
          0 0 35px rgba(79, 70, 229, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      [data-theme='dark'] .login-card {
        background: rgba(11, 15, 25, 0.25);
        /* Deep slate dark glass - highly transparent */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.4),
          0 0 40px rgba(139, 92, 246, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      [data-theme='dark'] .login-container:hover .login-card {
        box-shadow:
          0 30px 60px -10px rgba(0, 0, 0, 0.5),
          0 0 50px rgba(139, 92, 246, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      @media (max-width: 768px) {
        .login-container {
          flex-direction: column;
          max-width: 440px;
          gap: 20px;
        }

        .login-illustration {
          width: 100%;
          height: 280px;
          margin-right: 0;
          box-shadow: 0 10px 25px rgba(10, 8, 28, 0.15);
        }

        .login-card {
          padding: 2.25rem 2rem;
          width: 100%;
          min-height: auto;
        }
      }

      .login-header {
        margin-bottom: 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .login-title {
        font-family: var(--font-title);
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0;
        letter-spacing: -0.02em;
        transition: color 0.3s ease;
      }

      /* Form rows and alignment */
      .form-row {
        display: flex;
        align-items: center;
        margin-bottom: 1.25rem;
      }

      .form-row-label {
        width: 100px;
        text-align: left;
        font-size: 0.95rem;
        color: var(--text-secondary);
        font-weight: 600;
        transition: color 0.3s ease;
        flex-shrink: 0;
      }

      .form-row-column {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .form-row-input-wrapper {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
      }

      .form-input.pill-input {
        width: 100%;
        background: rgba(
          255,
          255,
          255,
          0.25
        ); /* Translucent, let bg show through */
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 30px;
        padding: 11px 16px 11px 44px;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 0.95rem;
        transition: all 0.25s ease;
        outline: none;
      }

      .form-input.pill-input:focus {
        background: rgba(255, 255, 255, 0.6);
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
      }

      .form-input.pill-input::placeholder {
        color: rgba(31, 41, 55, 0.4);
      }

      [data-theme='dark'] .form-input.pill-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      [data-theme='dark'] .form-input.pill-input:focus {
        background: rgba(0, 0, 0, 0.2);
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      }

      [data-theme='dark'] .form-input.pill-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .input-icon-left {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        display: flex;
        align-items: center;
        pointer-events: none;
        transition: color 0.3s ease;
      }

      .form-row-input-wrapper:focus-within .input-icon-left {
        color: var(--accent-primary);
      }

      /* Button rows and buttons style */
      .form-buttons-row {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
        margin-top: 1rem;
      }

      .btn-login-blue {
        background: #007bff;
        color: #ffffff !important;
        border-radius: 30px;
        padding: 11px 36px;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        box-shadow: 0 4px 14px rgba(0, 123, 255, 0.35);
      }

      .btn-login-blue:hover {
        background: #0069d9;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
      }

      .btn-login-blue:active {
        transform: translateY(0);
      }

      [data-theme='dark'] .btn-login-blue {
        box-shadow: 0 4px 14px rgba(0, 123, 255, 0.2);
      }

      /* Outline secondary button matching pill structure */
      .btn-secondary-outline {
        background: transparent;
        border: 1px solid var(--accent-primary);
        color: var(--accent-primary) !important;
        border-radius: 30px;
        padding: 11px 30px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        text-decoration: none;
      }

      .btn-secondary-outline:hover {
        background: var(--accent-light);
        transform: translateY(-2px);
      }

      .btn-secondary-outline:active {
        transform: translateY(0);
      }

      /* Theme Toggle placement override */
      .theme-toggle-container {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 100;
      }

      .theme-toggle-container .theme-toggle {
        background: rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.1);
        color: var(--text-primary);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .theme-toggle-container .theme-toggle:hover {
        background: rgba(0, 0, 0, 0.1);
        transform: scale(1.05);
      }

      [data-theme='dark'] .theme-toggle-container .theme-toggle {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      [data-theme='dark'] .theme-toggle-container .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Entrance animations */
      @media (min-width: 769px) {
        .login-illustration {
          animation: slide-in-illustration 2.2s cubic-bezier(0.16, 1, 0.3, 1)
            backwards;
        }

        .login-card {
          animation: slide-out-card 2.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
      }

      @media (max-width: 768px) {
        .login-illustration {
          animation: fade-in-illustration-mobile 1.8s
            cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .login-card {
          animation: fade-in-card-mobile 1.8s cubic-bezier(0.16, 1, 0.3, 1)
            backwards;
        }
      }

      @keyframes slide-in-illustration {
        0% {
          transform: translateX(240px);
        }
        100% {
          transform: translateX(0);
        }
      }

      @keyframes slide-out-card {
        0% {
          transform: translateX(-240px);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fade-in-illustration-mobile {
        0% {
          opacity: 0;
          transform: translateY(-20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in-card-mobile {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body class="login-body">
    <!-- Background Interactive Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Full-screen frosted glass overlay -->
    <div class="frosted-glass-overlay"></div>

    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container">
      <button
        class="theme-toggle"
        id="global-theme-btn"
        aria-label="Toggle Theme"
      ></button>
    </div>

    <!-- Reset Password Container -->
    <div class="login-container">
      <div class="login-illustration">
        <img src="assets/login_illustration.jpg" alt="Login Illustration" />
      </div>
      <div class="login-card">
        <div class="login-header">
          <h1 class="login-title">Reset Password</h1>
          <p
            style="
              font-size: 0.85rem;
              color: var(--text-secondary);
              margin-top: 0.25rem;
            "
          >
            Enter your email to receive a password reset link.
          </p>
        </div>

        <form id="reset-password-form">
          <!-- Email Row -->
          <div class="form-row">
            <label for="reset-email" class="form-row-label">Email</label>
            <div class="form-row-column">
              <div class="form-row-input-wrapper">
                <span class="input-icon-left">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                    ></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                  </svg>
                </span>
                <input
                  type="email"
                  id="reset-email"
                  class="form-input pill-input"
                  placeholder="Enter your email"
                  required
                  autocomplete="email"
                />
              </div>
            </div>
          </div>

          <!-- Buttons Row -->
          <div class="form-buttons-row">
            <a href="login.html" class="btn-secondary-outline">Back</a>
            <button type="submit" class="btn-login-blue" id="submit-btn">
              Send Link
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Standard Javascript Assets -->
    <script src="app.js"></script>
    <script>
      // Form submission simulation
      document
        .getElementById('reset-password-form')
        .addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('reset-email').value.trim();

          if (email) {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';

            setTimeout(() => {
              showToast(
                'Yêu cầu đặt lại mật khẩu đã được gửi thành công!',
                'success',
              );

              // Log audit details to LocalStorage (consistent with login.html)
              addAuditLogEntry(
                'Yêu cầu Reset Password',
                `Gửi yêu cầu reset mật khẩu cho email "${email}"`,
                'AUTH',
              );

              submitBtn.disabled = false;
              submitBtn.innerText = 'Send Link';
              document.getElementById('reset-email').value = '';
            }, 1500);
          }
        });

      // Logger helper matching login.html architecture
      function addAuditLogEntry(action, description, type) {
        const logs =
          JSON.parse(localStorage.getItem('myportfolio_audit_logs')) || [];
        const newLog = {
          id: 'log_' + Date.now(),
          action,
          description,
          type,
          user: 'Anonymous (Reset Password Request)',
          time: new Date().toLocaleString('vi-VN'),
        };
        logs.unshift(newLog);
        localStorage.setItem('myportfolio_audit_logs', JSON.stringify(logs));
      }
    </script>
  </body>
</html>
