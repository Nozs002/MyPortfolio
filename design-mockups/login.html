<!doctype html>
<html lang="vi" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập quản trị — MyPortfolio</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      /* Custom immersive styles for login page */
      body.login-body {
        background-image: url('assets/login_bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
        position: relative;
        overflow-y: auto;
        transition: background-image 0.5s ease;
      }

      [data-theme='dark'] body.login-body {
        background-image:
          linear-gradient(rgba(11, 15, 25, 0.65), rgba(11, 15, 25, 0.65)),
          url('assets/login_bg.jpg');
      }

      /* Ensure background canvas works properly */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        /* Place it on top of background image, but below card */
        pointer-events: none;
      }

      .login-container {
        position: relative;
        z-index: 10;
        /* Above canvas */
        width: 100%;
        max-width: 799px;
        /* Fits 320px illustration + 539px card with 60px overlap */
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
        transition: all 0.3s ease;
      }

      .login-illustration {
        width: 320px;
        height: 396px;
        /* Offset to overlap 336px card perfectly */
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(10, 8, 28, 0.18);
        z-index: 12;
        position: relative;
        margin-right: -60px;
        /* Overlaps with the card on the right */
        flex-shrink: 0;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .login-illustration img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: filter 0.5s ease;
      }

      [data-theme='dark'] .login-illustration img {
        filter: brightness(0.8) contrast(1.1) saturate(0.9);
      }

      .login-card {
        width: 539px;
        /* Fixed width requested by user */
        max-width: 100%;
        /* Override max-width: 440px from style.css */
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.15);
        /* Elegant highly transparent light glass */
        backdrop-filter: blur(32px) saturate(190%);
        -webkit-backdrop-filter: blur(32px) saturate(190%);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 32px;
        box-shadow:
          0 20px 40px -10px rgba(31, 41, 55, 0.06),
          0 0 30px rgba(79, 70, 229, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        padding: 1.5rem 2.5rem 1.5rem 5.5rem;
        /* Reduced vertical padding to fit 336px height */
        text-align: center;
        color: var(--text-primary);
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease,
          background 0.3s ease,
          border 0.3s ease;
        z-index: 11;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 336px;
        /* Fixed height requested by user */
      }

      .login-container:hover .login-illustration {
        transform: translateY(-4px);
        box-shadow: 0 25px 50px rgba(10, 8, 28, 0.22);
      }

      .login-container:hover .login-card {
        transform: translateY(-4px);
        box-shadow:
          0 25px 45px -8px rgba(31, 41, 55, 0.1),
          0 0 35px rgba(79, 70, 229, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      [data-theme='dark'] .login-card {
        background: rgba(11, 15, 25, 0.25);
        /* Deep slate dark glass - highly transparent */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.4),
          0 0 40px rgba(139, 92, 246, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      [data-theme='dark'] .login-container:hover .login-card {
        box-shadow:
          0 30px 60px -10px rgba(0, 0, 0, 0.5),
          0 0 50px rgba(139, 92, 246, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      @media (max-width: 768px) {
        .login-container {
          flex-direction: column;
          max-width: 440px;
          gap: 20px;
        }

        .login-illustration {
          width: 100%;
          height: 280px;
          margin-right: 0;
          box-shadow: 0 10px 25px rgba(10, 8, 28, 0.15);
        }

        .login-card {
          padding: 2.25rem 2rem;
          width: 100%;
          min-height: auto;
        }
      }

      .login-header {
        margin-bottom: 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .login-title {
        font-family: var(--font-title);
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0;
        letter-spacing: -0.02em;
        transition: color 0.3s ease;
      }

      /* Form rows and alignment */
      .form-row {
        display: flex;
        align-items: center;
        margin-bottom: 1rem;
      }

      .form-row.password-row {
        align-items: flex-end;
        /* Align label to input, matching column structure */
      }

      .form-row.password-row .form-row-label {
        margin-bottom: 12px;
        /* Center-align label with the input wrapper */
      }

      .form-row-label {
        width: 100px;
        text-align: left;
        font-size: 0.95rem;
        color: var(--text-secondary);
        font-weight: 600;
        transition: color 0.3s ease;
        flex-shrink: 0;
      }

      .form-row-column {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .forgot-password-container {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 4px;
      }

      .forgot-link-right {
        color: var(--text-secondary);
        font-weight: 500;
        font-size: 0.85rem;
        transition: color 0.2s ease;
        text-decoration: none;
      }

      .forgot-link-right:hover {
        color: var(--accent-primary);
        text-decoration: underline;
      }

      .form-row-input-wrapper {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
      }

      .form-input.pill-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.25);
        /* Translucent, let bg show through */
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 30px;
        padding: 11px 16px 11px 44px;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 0.95rem;
        transition: all 0.25s ease;
        outline: none;
      }

      .form-input.pill-input:focus {
        background: rgba(255, 255, 255, 0.6);
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
      }

      .form-input.pill-input::placeholder {
        color: rgba(31, 41, 55, 0.4);
      }

      [data-theme='dark'] .form-input.pill-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      [data-theme='dark'] .form-input.pill-input:focus {
        background: rgba(0, 0, 0, 0.2);
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      }

      [data-theme='dark'] .form-input.pill-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .input-icon-left {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        display: flex;
        align-items: center;
        pointer-events: none;
        transition: color 0.3s ease;
      }

      .form-row-input-wrapper:focus-within .input-icon-left {
        color: var(--accent-primary);
      }

      .form-input-password {
        padding-right: 44px !important;
      }

      /* Password Toggle Icon */
      .password-toggle-btn {
        position: absolute;
        right: 14px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
        z-index: 2;
      }

      .password-toggle-btn:hover {
        color: var(--text-primary);
      }

      /* Button rows and buttons style */
      .form-buttons-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
      }

      .btn-google-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        flex-shrink: 0;
      }

      .btn-google-circle:hover {
        background: #fafafa;
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
      }

      [data-theme='dark'] .btn-google-circle {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: none;
      }

      [data-theme='dark'] .btn-google-circle:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .google-icon-svg-circle {
        width: 20px;
        height: 20px;
        display: block;
      }

      .btn-login-blue {
        background: #007bff;
        color: #ffffff !important;
        border-radius: 30px;
        padding: 11px 36px;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        box-shadow: 0 4px 14px rgba(0, 123, 255, 0.35);
      }

      .btn-login-blue:hover {
        background: #0069d9;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
      }

      .btn-login-blue:active {
        transform: translateY(0);
      }

      [data-theme='dark'] .btn-login-blue {
        box-shadow: 0 4px 14px rgba(0, 123, 255, 0.2);
      }

      .forgot-link-center {
        color: var(--text-secondary);
        font-weight: 500;
        font-size: 0.85rem;
        transition: color 0.2s ease;
        text-decoration: none;
      }

      .forgot-link-center:hover {
        color: var(--accent-primary);
        text-decoration: underline;
      }

      /* Theme Toggle placement override */
      .theme-toggle-container {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 100;
      }

      .theme-toggle-container .theme-toggle {
        background: rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.1);
        color: var(--text-primary);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .theme-toggle-container .theme-toggle:hover {
        background: rgba(0, 0, 0, 0.1);
        transform: scale(1.05);
      }

      [data-theme='dark'] .theme-toggle-container .theme-toggle {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      [data-theme='dark'] .theme-toggle-container .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Entrance animations */
      @media (min-width: 769px) {
        .login-illustration {
          animation: slide-in-illustration 2.2s cubic-bezier(0.16, 1, 0.3, 1)
            backwards;
        }

        .login-card {
          animation: slide-out-card 2.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
      }

      @media (max-width: 768px) {
        .login-illustration {
          animation: fade-in-illustration-mobile 1.8s
            cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .login-card {
          animation: fade-in-card-mobile 1.8s cubic-bezier(0.16, 1, 0.3, 1)
            backwards;
        }
      }

      @keyframes slide-in-illustration {
        0% {
          transform: translateX(240px);
        }

        100% {
          transform: translateX(0);
        }
      }

      @keyframes slide-out-card {
        0% {
          transform: translateX(-240px);
          opacity: 0;
        }

        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fade-in-illustration-mobile {
        0% {
          opacity: 0;
          transform: translateY(-20px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in-card-mobile {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body class="login-body">
    <!-- Background Interactive Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container">
      <button
        class="theme-toggle"
        id="global-theme-btn"
        aria-label="Toggle Theme"
      ></button>
    </div>

    <!-- Login Card Container -->
    <div class="login-container">
      <!-- Left Illustration Image -->
      <div class="login-illustration">
        <img src="assets/login_illustration.jpg" alt="Login Illustration" />
      </div>
      <div class="login-card">
        <div class="login-header">
          <h1 class="login-title">Welcome Back</h1>
        </div>

        <!-- Traditional Login Form -->
        <form id="cms-login-form">
          <!-- Username Row -->
          <div class="form-row">
            <label for="login-username" class="form-row-label">Username</label>
            <div class="form-row-input-wrapper">
              <span class="input-icon-left">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  ></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </span>
              <input
                type="text"
                id="login-username"
                class="form-input pill-input"
                placeholder="John.Doe"
                required
                autocomplete="username"
              />
            </div>
          </div>

          <!-- Password Row -->
          <div class="form-row password-row">
            <label for="login-password" class="form-row-label">Password</label>
            <div class="form-row-column">
              <div class="forgot-password-container">
                <a href="#" class="forgot-link-right">Forgot password?</a>
              </div>
              <div class="form-row-input-wrapper">
                <span class="input-icon-left">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect
                      x="3"
                      y="11"
                      width="18"
                      height="11"
                      rx="2"
                      ry="2"
                    ></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                </span>
                <input
                  type="password"
                  id="login-password"
                  class="form-input form-input-password pill-input"
                  placeholder="••••••••"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="password-toggle-btn"
                  id="password-toggle-btn"
                  aria-label="Toggle Password Visibility"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="eye-icon"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Button Row: Google & Login -->
          <div class="form-buttons-row">
            <button
              type="button"
              class="btn-google-circle"
              id="google-login-btn"
              aria-label="Sign In with Google"
            >
              <svg
                viewBox="0 0 24 24"
                class="google-icon-svg-circle"
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
              >
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
                  fill="#EA4335"
                />
              </svg>
            </button>
            <button type="submit" class="btn-login-blue">Login</button>
          </div>
        </form>

        <div style="margin-top: 0.75rem; font-size: 0.85rem">
          <a href="index.html" class="forgot-link-center"
            >&larr; Quay lại trang chủ Portfolio</a
          >
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Password visibility toggle logic
      const passwordInput = document.getElementById('login-password');
      const toggleBtn = document.getElementById('password-toggle-btn');
      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
          const isPassword = passwordInput.getAttribute('type') === 'password';
          passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

          // Update SVG icon inside the button
          if (isPassword) {
            toggleBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-off-icon">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>`;
          } else {
            toggleBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>`;
          }
        });
      }

      // Specific client-side validation logic for login redirects
      document
        .getElementById('cms-login-form')
        .addEventListener('submit', (e) => {
          e.preventDefault();
          const u = document.getElementById('login-username').value.trim();
          const p = document.getElementById('login-password').value.trim();

          const uLower = u.toLowerCase();
          // Allow logging in with either "admin" or "admin@myportfolio.dev"
          if (
            (uLower === 'admin' || uLower === 'admin@myportfolio.dev') &&
            p === 'admin'
          ) {
            showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');

            // Write Audit Log
            addAuditLogEntry(
              'Đăng nhập',
              'Đăng nhập thành công bằng Credentials (admin)',
              'AUTH',
            );

            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1200);
          } else {
            showToast('Sai tài khoản hoặc mật khẩu!', 'error');
            addAuditLogEntry(
              'Đăng nhập thất bại',
              `Thử đăng nhập sai với tài khoản "${u}"`,
              'AUTH',
            );
          }
        });

      document
        .getElementById('google-login-btn')
        .addEventListener('click', () => {
          showToast(
            'Xác thực tài khoản Google... Đang chuyển hướng...',
            'success',
          );

          // Write Audit Log
          addAuditLogEntry(
            'Đăng nhập',
            'Đăng nhập thành công bằng tài khoản Google (admin@myportfolio.dev)',
            'AUTH',
          );

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1200);
        });

      function addAuditLogEntry(action, description, type) {
        const logs = JSON.parse(
          localStorage.getItem('myportfolio_audit_logs'),
        ) || [
          {
            id: 'log_1',
            action: 'Đăng nhập',
            description:
              'Đăng nhập thành công qua Google OAuth (admin@myportfolio.dev)',
            type: 'AUTH',
            user: 'Portfolio Owner (Admin)',
            time: new Date().toLocaleString('vi-VN'),
          },
        ];
        const newLog = {
          id: 'log_' + Date.now(),
          action,
          description,
          type,
          user: 'Portfolio Owner (Admin)',
          time: new Date().toLocaleString('vi-VN'),
        };
        logs.unshift(newLog);
        localStorage.setItem('myportfolio_audit_logs', JSON.stringify(logs));
      }
    </script>
